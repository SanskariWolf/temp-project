<!-- templates/index.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Visual Product Matcher</title>
</head>
<body>
  <h2>Upload an Image</h2>
  <input type="file" id="imageInput">
  <button onclick="uploadImage()">Search</button>
  <div id="results"></div>

  <script>
    async function uploadImage() {
      const input = document.getElementById("imageInput");
      if(input.files.length === 0) return alert("Select an image!");

      const formData = new FormData();
      formData.append("file", input.files[0]);

      const res = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";
      data.top_images.forEach(img => {
        const imageElem = document.createElement("img");
        imageElem.src = "/static/images/" + encodeURIComponent(img);  // copy your 500 images to 'static/images' folder
        imageElem.width = 150;
        resultsDiv.appendChild(imageElem);
      });
    }
  </script>
</body>
</html>
